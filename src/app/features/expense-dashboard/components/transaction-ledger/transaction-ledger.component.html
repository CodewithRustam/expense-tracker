<div class="ledger-container">

  <!-- LOADING SKELETONS -->
  <ng-container *ngIf="isLoadingExpenses">
    <div class="timeline-ledger-container">
      <div class="timeline-group" *ngFor="let i of [1,2,3]">
        <div class="timeline-date-header">
          <ion-skeleton-text animated style="width:44px; height:10px; border-radius:4px;"></ion-skeleton-text>
        </div>
        <div class="timeline-row-content">
          <div class="timeline-node-circle"></div>
          <div class="timeline-card" style="flex:1; padding:10px 12px;">
            <ion-skeleton-text animated style="width:60%; height:14px; margin-bottom:6px;"></ion-skeleton-text>
            <ion-skeleton-text animated style="width:38%; height:10px;"></ion-skeleton-text>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- ACTUAL TRANSACTION LIST — TIMELINE LAYOUT -->
  <ng-container *ngIf="!isLoadingExpenses && hasExpenses()">
    <div class="timeline-ledger-container">
      <ng-container *ngFor="let user of users">
        <ng-container *ngIf="selectedUser === user.memberId">

          <div class="timeline-group" *ngFor="let group of groupedExpensesMap[user.memberId]">

            <!-- Date label -->
            <div class="timeline-date-header">
              <span class="timeline-date-label">{{ group.date }}</span>
            </div>

            <div class="timeline-row-content">
              <!-- Category icon node -->
              <div class="timeline-node-circle">
                <i [class]="group.expenses[0]?.iconName"
                   [style.color]="getIconColor(group.expenses[0]?.iconName)"></i>
              </div>

              <!-- Grouped card -->
              <div class="timeline-card">
                <ion-item-sliding #slidingItem
                  *ngFor="let exp of group.expenses; let last = last"
                  [disabled]="user?.badgeText === 'Settled up' || !exp.isEditShow"
                  class="tl-slide-item">

                  <!-- ion-item with zero padding — acts only as swipe wrapper -->
                  <ion-item lines="none" class="tl-item-zero">
                    <!-- All visual layout via plain div — complete CSS control -->
                    <div class="tx-content-row" [class.no-border]="last">
                      <div class="tx-left">
                        <span class="tx-title">{{ exp.item }}</span>
                        <div class="tx-badges">
                          <span *ngIf="exp.userShareAmount" class="share-chip">
                            ₹{{ exp.userShareAmount }}
                          </span>
                          <span class="category-badge"
                                [ngClass]="getCategoryBadgeClass(exp.category)">
                            {{ exp.category }}
                          </span>
                        </div>
                      </div>
                      <span class="tx-amt">₹{{ exp.amount | number:'1.0-0' }}</span>
                    </div>
                  </ion-item>

                  <ion-item-options side="end">
                    <ion-item-option class="swipe-btn swipe-edit" *ngIf="exp.isEditShow" (click)="editExpense(exp, slidingItem)">
                      <div class="swipe-content">
                        <i class="fa-solid fa-pen-to-square"></i>
                      </div>
                    </ion-item-option>
                    <ion-item-option class="swipe-btn swipe-delete" (click)="deleteExpense(exp, slidingItem)">
                      <div class="swipe-content">
                        <i class="fa-solid fa-trash-can"></i>
                      </div>
                    </ion-item-option>
                  </ion-item-options>

                </ion-item-sliding>
              </div>

            </div>

          </div>

        </ng-container>
      </ng-container>
    </div>
  </ng-container>

  <!-- EMPTY STATE -->
  <ng-container *ngIf="!isLoadingExpenses && !hasExpenses()">
    <div class="empty-ledger">
      <i class="fa-solid fa-ghost"></i>
      <p>No transactions this month</p>
    </div>
  </ng-container>

</div>
