<ion-content class="register-page" fullscreen>
  <div class="auth-page-container" style="max-width: 420px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%;">
    
    <!-- Logo / Branding -->
    <div class="logo-section" style="text-align: center;">
      <img src="/assets/donut-chart.png" class="responsive-logo" alt="SplitX Logo" />
      <h2 class="welcome-text">SplitX</h2>
      <p class="sub-text">Sign up to continue</p>
    </div>

    <div class="card-wrapper" style="margin: 0 auto; width: 100%;">
      <ion-card class="auth-card" style="margin: 0 auto; width: 100%;">
        <ion-card-content>
          <form #registerForm="ngForm" (ngSubmit)="onRegister()">

            <!-- Username Field -->
            <ion-item class="input-item" lines="none">
              <ion-icon name="person-outline" slot="start"></ion-icon>
              <ion-input type="text" placeholder="Username" [(ngModel)]="registerData.username" name="username" required
                minlength="3" class="glowing-input"></ion-input>
            </ion-item>

            <!-- Email Field -->
            <ion-item class="input-item" lines="none">
              <ion-icon name="mail-outline" slot="start"></ion-icon>
              <ion-input type="email" placeholder="Email" [(ngModel)]="registerData.email" name="email" required email
                class="glowing-input"></ion-input>
            </ion-item>

            <!-- Password Field -->
            <ion-item class="input-item" lines="none">
              <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
              <ion-input type="password" placeholder="Password" [(ngModel)]="registerData.password" name="password"
                required minlength="6" class="glowing-input"></ion-input>
            </ion-item>

            <!-- Confirm Password Field -->
            <ion-item class="input-item" lines="none">
              <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
              <ion-input type="password" placeholder="Confirm Password" [(ngModel)]="registerData.confirmPassword"
                name="confirmPassword" required minlength="6" class="glowing-input"></ion-input>
            </ion-item>

            <!-- Error Message -->
            <p class="error-message" *ngIf="errorMessage" style="color: #ff5252; font-size: 0.85rem; margin-top: 10px; text-align: center;">{{ errorMessage }}</p>

            <!-- Submit Button -->
            <ion-button type="submit" expand="block" class="register-btn" style="margin-top: 16px;"
              [disabled]="!registerForm.valid || registerData.password !== registerData.confirmPassword || isLoading">
              <span *ngIf="!isLoading">Register</span>
              <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
            </ion-button>
          </form>

          <!-- Login Link -->
          <p class="login-link" style="margin-top: 20px; text-align: center;">
            Already have an account? <a (click)="goToLogin()">Login</a>
          </p>
        </ion-card-content>
      </ion-card>
    </div>

  </div>
</ion-content>
