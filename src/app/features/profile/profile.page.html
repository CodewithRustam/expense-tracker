<ion-header class="ion-no-border" [translucent]="true">
  <ion-toolbar [class.animate-header]="playHeaderAnim">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="tabs/home" icon="arrow-back-outline"></ion-back-button>
    </ion-buttons>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="content-wrapper">
    
    <!-- PROFILE HERO CARD -->
    <div class="profile-hero">
      <div class="avatar-container">
        <ion-avatar>
          <img
            [src]="user?.avatar || 'https://avataaars.io/?avatarStyle=Circle&topType=ShortHairShortFlat&facialHairType=BeardLight&clotheType=BlazerSweater&clotheColor=Blue03&eyeType=Default&eyebrowType=Default&mouthType=Smile&skinColor=Light'"
            alt="avatar">
        </ion-avatar>
        <div class="edit-badge" (click)="editProfile()">
          <ion-icon name="pencil"></ion-icon>
        </div>
      </div>

      <h2 class="user-name">{{ user?.name || 'User Name' }}</h2>
      <p class="user-email">{{ user?.email || 'user@example.com' }}</p>

      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-val">{{ totalGroups }}</span>
          <span class="stat-label">Groups</span>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <span class="stat-val">₹{{ totalSpent | number:'1.0-0' }}</span>
          <span class="stat-label">Spent</span>
        </div>
      </div>
    </div>

    <!-- GENERAL SECTION -->
    <div class="section-header">
      <h3 class="section-title">General</h3>
    </div>

    <!-- SETTINGS CARD LIST -->
    <div class="chart-card settings-card-wrapper">
      <div class="row-list">
        <div class="row-item ion-activatable" *ngFor="let item of settings">
          <div class="icon-box">
            <ion-icon [name]="item.icon"></ion-icon>
          </div>
          <div class="text-group">
            <span class="item-name">{{ item.label }}</span>
          </div>
          <ion-icon name="chevron-forward" class="chevron"></ion-icon>
          <ion-ripple-effect></ion-ripple-effect>
        </div>

        <div class="row-item logout ion-activatable" (click)="logout()">
          <div class="icon-box danger">
            <ion-icon name="log-out-outline"></ion-icon>
          </div>
          <div class="text-group">
            <span class="item-name danger-text">Logout</span>
          </div>
          <ion-ripple-effect></ion-ripple-effect>
        </div>
      </div>
    </div>

  </div>
</ion-content>
